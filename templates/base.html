<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luz da Palavra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #2e7d32; }
        .navbar { background-color: var(--primary-color); }
        .btn-primary { background-color: var(--primary-color); border: none; }
        .card-plano { border-radius: 15px; border: 2px solid #e0e0e0; transition: 0.3s; }
        .card-plano:hover { border-color: var(--primary-color); transform: translateY(-5px); }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🌿 LUZ DA PALAVRA</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
