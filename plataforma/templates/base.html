<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luz da Palavra | Jornada Espiritual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-emerald-800 flex items-center gap-2">
                <span>🌿</span> Luz da Palavra
            </a>
            <div class="space-x-4">
                {% if user.is_authenticated %}
                    <a href="/dashboard/" class="bg-emerald-700 text-white px-5 py-2.5 rounded-full font-semibold hover:bg-emerald-800 transition shadow-sm">Meu Painel</a>
                {% else %}
                    <a href="/quiz/" class="bg-emerald-700 text-white px-5 py-2.5 rounded-full font-semibold hover:bg-emerald-800 transition shadow-sm">Fazer Teste Grátis</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="min-h-screen">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-stone-200 py-10 text-center text-stone-500 text-sm">
        <p>© 2026 Luz da Palavra. Feito com amor e propósito.</p>
    </footer>

</body>
</html>
